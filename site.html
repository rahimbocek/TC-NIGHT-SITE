<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TC NIGHT SQUAD</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b0f19;
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
width:100%;
}

.sidebar{
width:260px;
background:#08111f;
border-right:2px solid #00bfff;
padding:20px;
overflow:auto;
}

.logo{
font-size:28px;
font-weight:bold;
color:#00bfff;
margin-bottom:20px;
text-shadow:0 0 15px #00bfff;
}

.menu button{
width:100%;
padding:14px;
margin-bottom:10px;
border:none;
border-radius:12px;
background:#101b2d;
color:white;
cursor:pointer;
font-size:15px;
transition:0.2s;
}

.menu button:hover{
background:#00bfff;
color:black;
transform:scale(1.03);
}

.main{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

.topbar{
height:70px;
background:#08111f;
border-bottom:2px solid #00bfff;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
}

.title{
font-size:24px;
font-weight:bold;
color:#00bfff;
text-shadow:0 0 15px #00bfff;
}

.actions{
display:flex;
gap:10px;
}

.actions button{
padding:10px 16px;
border:none;
border-radius:10px;
background:#00bfff;
color:black;
font-weight:bold;
cursor:pointer;
}

.content{
flex:1;
overflow:auto;
padding:20px;
}

.section{
display:none;
}

.section.active{
display:block;
}

.card{
background:#101b2d;
border:1px solid #00bfff;
border-radius:20px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 15px rgba(0,191,255,0.3);
}

.hero{
padding:40px;
text-align:center;
}

.hero h1{
font-size:42px;
margin-bottom:15px;
color:#00bfff;
}

.hero p{
font-size:18px;
opacity:0.8;
margin-bottom:25px;
}

.hero button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:14px;
background:#00bfff;
color:black;
font-weight:bold;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:25px;
}

.stat{
background:#08111f;
padding:20px;
border-radius:18px;
border:1px solid #00bfff;
text-align:center;
}

.stat h2{
font-size:35px;
color:#00bfff;
}

.member-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.member{
background:#08111f;
border:1px solid #00bfff;
border-radius:18px;
padding:15px;
text-align:center;
position:relative;
}

.member img{
width:90px;
height:90px;
border-radius:50%;
border:3px solid #00bfff;
object-fit:cover;
margin-bottom:10px;
}

.online{
position:absolute;
top:15px;
right:15px;
width:15px;
height:15px;
border-radius:50%;
background:lime;
box-shadow:0 0 10px lime;
}

.offline{
position:absolute;
top:15px;
right:15px;
width:15px;
height:15px;
border-radius:50%;
background:gray;
}

.ingame{
position:absolute;
top:15px;
right:15px;
width:15px;
height:15px;
border-radius:50%;
background:orange;
box-shadow:0 0 10px orange;
}

.member h3{
margin-top:10px;
}

.member p{
opacity:0.8;
margin-top:5px;
}

.chat-box{
height:400px;
overflow:auto;
background:#08111f;
border-radius:18px;
padding:15px;
margin-bottom:15px;
border:1px solid #00bfff;
}

.message{
margin-bottom:10px;
padding:10px;
background:#101b2d;
border-radius:12px;
}

.chat-input{
display:flex;
gap:10px;
}

.chat-input input{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:#08111f;
color:white;
}

.chat-input button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#00bfff;
color:black;
font-weight:bold;
cursor:pointer;
}

.list-item{
background:#08111f;
padding:15px;
border-radius:14px;
border:1px solid #00bfff;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.list-item button{
padding:8px 12px;
border:none;
border-radius:10px;
background:#00bfff;
color:black;
font-weight:bold;
cursor:pointer;
}

.theme-red{
background:#190b0b;
}

.theme-red .sidebar,
.theme-red .topbar{
background:#220d0d;
border-color:#ff2b2b;
}

.theme-red .logo,
.theme-red .title{
color:#ff2b2b;
text-shadow:0 0 15px #ff2b2b;
}

.theme-red .menu button:hover,
.theme-red .actions button,
.theme-red .hero button,
.theme-red .chat-input button,
.theme-red .list-item button{
background:#ff2b2b;
color:white;
}

.theme-red .card,
.theme-red .member,
.theme-red .stat,
.theme-red .chat-box,
.theme-red .list-item{
border-color:#ff2b2b;
}

.light-theme{
background:#f2f2f2;
color:black;
}

.light-theme .sidebar,
.light-theme .topbar{
background:white;
}

.light-theme .card,
.light-theme .member,
.light-theme .stat,
.light-theme .chat-box,
.light-theme .list-item{
background:white;
color:black;
}

@media(max-width:900px){

.sidebar{
width:90px;
padding:10px;
}

.logo{
font-size:16px;
}

.menu button{
font-size:11px;
padding:10px;
}

.hero h1{
font-size:28px;
}

.topbar{
padding:10px;
}

.title{
font-size:18px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">TC NIGHT</div>

<div class="menu">
<button onclick="openSection('home')">🏠 Ana Menü</button>
<button onclick="openSection('members')">👥 Members</button>
<button onclick="openSection('missions')">🎯 Missions</button>
<button onclick="openSection('games')">🎮 Games</button>
<button onclick="openSection('servers')">🖥 Servers</button>
<button onclick="openSection('files')">📁 Files</button>
<button onclick="openSection('awards')">🏆 Awards</button>
<button onclick="openSection('chat')">💬 Live Chat</button>
<button onclick="openSection('settings')">⚙ Settings</button>
</div>

</div>

<div class="main">

<div class="topbar">
<div class="title">TC NIGHT SQUAD</div>

<div class="actions">
<button onclick="zoomIn()">➕</button>
<button onclick="zoomOut()">➖</button>
</div>
</div>

<div class="content">

<div class="section active" id="home">

<div class="card hero">
<h1>TC NIGHT SQUAD</h1>
<p>Official tactical squad platform</p>

<button onclick="window.open('https://s.team/chat/niBedXU5')">
JOIN THE SQUAD
</button>

<div class="stats">

<div class="stat">
<h2 id="memberCount">0</h2>
<p>Members</p>
</div>

<div class="stat">
<h2 id="onlineCount">0</h2>
<p>Online</p>
</div>

<div class="stat">
<h2>24/7</h2>
<p>System</p>
</div>

</div>

</div>

</div>

<div class="section" id="members">

<div class="card">
<h2>Members</h2>
</div>

<div class="member-grid" id="memberGrid"></div>

</div>

<div class="section" id="missions">

<div class="card">
<h2>Missions</h2>
</div>

<div id="missionList"></div>

</div>

<div class="section" id="games">

<div class="card">
<h2>Games</h2>
</div>

<div id="gameList"></div>

</div>

<div class="section" id="servers">

<div class="card">
<h2>Servers</h2>
</div>

<div id="serverList"></div>

</div>

<div class="section" id="files">

<div class="card">
<h2>Files</h2>
</div>

<div id="fileList"></div>

</div>

<div class="section" id="awards">

<div class="card">
<h2>Awards</h2>
</div>

<div id="awardList"></div>

</div>

<div class="section" id="chat">

<div class="card">
<h2>Live Chat</h2>

<div class="chat-box" id="chatBox"></div>

<div class="chat-input">
<input type="text" id="chatInput" placeholder="Mesaj yaz">
<button onclick="sendMessage()">Gönder</button>
</div>

</div>

</div>

<div class="section" id="settings">

<div class="card">
<h2>Settings</h2>

<div class="list-item">
<span>Kırmızı Tema</span>
<button onclick="redTheme()">Aktif</button>
</div>

<div class="list-item">
<span>Karanlık Tema</span>
<button onclick="darkTheme()">Aktif</button>
</div>

<div class="list-item">
<span>Beyaz Tema</span>
<button onclick="lightTheme()">Aktif</button>
</div>

</div>

</div>

</div>

</div>

</div>

<script>

function openSection(id){

document.querySelectorAll(".section").forEach(sec=>{
sec.classList.remove("active");
});

document.getElementById(id).classList.add("active");

}

let zoomLevel = 1;

function zoomIn(){
zoomLevel += 0.1;
document.body.style.zoom = zoomLevel;
}

function zoomOut(){
zoomLevel -= 0.1;
document.body.style.zoom = zoomLevel;
}

function redTheme(){
document.body.className = "theme-red";
}

function darkTheme(){
document.body.className = "";
}

function lightTheme(){
document.body.className = "light-theme";
}

async function loadMembers(){

const response = await fetch("https://tc-night-site.onrender.com/members");

const members = await response.json();

document.getElementById("memberCount").innerText = members.length;

let online = 0;

const grid = document.getElementById("memberGrid");

grid.innerHTML = "";

members.forEach(member=>{

if(member.status === "online" || member.personastate === 1){
online++;
}

let statusClass = "offline";

if(member.status === "online" || member.personastate === 1){
statusClass = "online";
}

if(member.gameextrainfo){
statusClass = "ingame";
}

grid.innerHTML += `
<div class="member">

<div class="${statusClass}"></div>

<img src="${member.avatarfull || member.avatar}" />

<h3>${member.personaname || member.name}</h3>

<p>${member.rank || "TC MEMBER"}</p>

<p>${member.gameextrainfo || "Offline"}</p>

</div>
`;

});

document.getElementById("onlineCount").innerText = online;

}

loadMembers();

function addList(id,text){

document.getElementById(id).innerHTML += `
<div class="list-item">
<span>${text}</span>
<button>OPEN</button>
</div>
`;

}

addList("missionList","TF2 Tactical Operation");
addList("missionList","Night Recon");
addList("missionList","Defense Protocol");

addList("gameList","Team Fortress 2");
addList("gameList","Unturned");
addList("gameList","Project Zomboid");

addList("serverList","EU Tactical Server");
addList("serverList","Zombie Survival");

addList("fileList","Operation Docs");
addList("fileList","Night Protocol");

addList("awardList","EMPEROR → Founder Award");
addList("awardList","TF2 UNIT → Combat Medal");

function sendMessage(){

let input = document.getElementById("chatInput");

if(input.value.trim() === "") return;

let box = document.getElementById("chatBox");

box.innerHTML += `
<div class="message">
<b>EMPEROR:</b> ${input.value}
</div>
`;

localStorage.setItem("chatData",box.innerHTML);

input.value = "";

}

window.onload = ()=>{

const saved = localStorage.getItem("chatData");

if(saved){
document.getElementById("chatBox").innerHTML = saved;
}

};

</script>

</body>
</html>
